name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: rigcheck_ci
          POSTGRES_USER: rigcheck_ci_user
          POSTGRES_PASSWORD: rigcheck_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rigcheck_ci_user -d rigcheck_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: rigcheck_ci
      POSTGRES_USER: rigcheck_ci_user
      POSTGRES_PASSWORD: rigcheck_ci_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: ci-jwt-secret-do-not-use-in-prod
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      COOKIE_SECURE: false
      COOKIE_SAMESITE: lax
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Python compilation checks
        working-directory: backend
        run: python -m compileall app

      - name: Run pytest
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: npm run build
